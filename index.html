<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#12372a">
  <meta name="description" content="Central de locações e imóveis à venda de Diego Galafassi.">
  <title>Visão Geral — Diego Imóveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <aside class="sidebar" id="sidebar" aria-label="Navegação principal">
    <div class="brand">
      <div class="brand-mark">DG</div>
      <div><strong>Diego Galafassi</strong><span>Gestão imobiliária</span></div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="#dashboard" data-route="dashboard"><i data-lucide="layout-dashboard"></i><span>Visão geral</span></a>
      <a class="nav-item" href="#locacoes" data-route="locacoes"><i data-lucide="key-round"></i><span>Locações</span></a>
      <a class="nav-item" href="#financeiro" data-route="financeiro"><i data-lucide="calendar-check-2"></i><span>Grade anual</span></a>
      <a class="nav-item" href="#vendas" data-route="vendas"><i data-lucide="badge-dollar-sign"></i><span>Imóveis à venda</span></a>
    </nav>
    <div class="sidebar-footer">
      <a class="nav-item" href="#configuracoes" data-route="configuracoes"><i data-lucide="settings-2"></i><span>Configurações</span></a>
      <div class="system-status"><span class="status-dot" id="connectionDot"></span><span id="connectionText">Verificando conexão</span></div>
      <span class="version">Diego Imóveis · v2.0</span>
    </div>
  </aside>

  <button class="sidebar-overlay" id="sidebarOverlay" aria-label="Fechar menu"></button>

  <div class="app-shell">
    <header class="topbar">
      <button class="icon-button menu-button" id="menuBtn" aria-label="Abrir menu"><i data-lucide="menu"></i></button>
      <div class="page-heading"><span id="pageEyebrow">Central de gestão</span><h1 id="pageTitle">Visão geral</h1></div>
      <div class="topbar-actions">
        <button class="icon-button" id="refreshBtn" aria-label="Atualizar dados" title="Atualizar"><i data-lucide="refresh-cw"></i></button>
        <button class="primary-button" id="quickAddBtn"><i data-lucide="plus"></i><span>Novo cadastro</span></button>
      </div>
    </header>

    <main class="page-content" id="pageContent" tabindex="-1">
      <div class="loading-state"><span class="loader"></span><p>Organizando seus dados…</p></div>
    </main>
  </div>

  <nav class="mobile-nav" aria-label="Navegação mobile">
    <a href="#dashboard" data-route="dashboard" class="active"><i data-lucide="layout-dashboard"></i><span>Início</span></a>
    <a href="#locacoes" data-route="locacoes"><i data-lucide="key-round"></i><span>Locações</span></a>
    <button id="mobileAddBtn" aria-label="Novo cadastro"><span><i data-lucide="plus"></i></span></button>
    <a href="#financeiro" data-route="financeiro"><i data-lucide="calendar-check-2"></i><span>Grade</span></a>
    <a href="#vendas" data-route="vendas"><i data-lucide="badge-dollar-sign"></i><span>Vendas</span></a>
  </nav>

  <div class="modal-overlay" id="modalOverlay" role="presentation">
    <section class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-header"><div><span class="modal-kicker" id="modalKicker">Cadastro</span><h2 id="modalTitle">Novo registro</h2></div><button class="icon-button" id="modalClose" aria-label="Fechar"><i data-lucide="x"></i></button></header>
      <div class="modal-body" id="modalBody"></div>
      <footer class="modal-footer" id="modalFooter"></footer>
    </section>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  <script type="module" src="js/app.js?v=20260723-1"></script>
</body>
</html>
